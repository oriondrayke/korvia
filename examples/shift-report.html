<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Report | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .corner-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 150;
        }
        .report {
            width: 100%;
            max-width: 480px;
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 32px;
        }
        .report h1 {
            font-family: var(--kv-font-serif);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 4px;
        }
        .report .subtitle { color: var(--kv-ink-muted); margin-bottom: 24px; }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--kv-rule);
        }
        .metric:last-child { border-bottom: none; }
        .metric span:first-child { color: var(--kv-ink-muted); }
        .metric strong { font-size: 1.05rem; color: var(--kv-ink); }
        .total-row {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid var(--kv-accent);
            display: flex;
            justify-content: space-between;
            font-size: 1.15rem;
        }
        .note-box { margin-top: 24px; }
        .note-box textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
        }
        .btn { width: 100%; margin-top: 16px; }
        .back-link {
            margin-top: 24px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 14px;
            border: 1px solid var(--kv-rule-strong);
            border-radius: var(--kv-radius);
            transition: all 150ms ease;
        }
        .back-link:hover {
            color: var(--kv-ink);
            border-color: var(--kv-ink);
        }
    </style>
</head>
<body class="kv-ruled-subtle">
    <div class="corner-controls">
        <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
            <div class="kv-theme-slider"></div>
            <button class="kv-theme-option" data-value="light">Light</button>
            <button class="kv-theme-option" data-value="dark">Dark</button>
            <button class="kv-theme-option" data-value="auto">Auto</button>
        </div>
    </div>

    <div class="report">
        <h1>Shift Report</h1>
        <p class="subtitle" id="subtitle"></p>

        <div class="metric">
            <span>Shift started</span>
            <strong id="started">—</strong>
        </div>
        <div class="metric">
            <span>Shift ended</span>
            <strong id="ended">—</strong>
        </div>
        <div class="metric">
            <span>Duration</span>
            <strong id="duration">—</strong>
        </div>
        <div class="metric">
            <span>Break time</span>
            <strong id="break-time">0 min</strong>
        </div>
        <div class="metric">
            <span>Orders served</span>
            <strong id="orders-served">0</strong>
        </div>
        <div class="metric">
            <span>Payments collected</span>
            <strong id="payments-collected">$0</strong>
        </div>
        <div class="metric">
            <span>Cash collected</span>
            <strong id="cash-collected">$0</strong>
        </div>
        <div class="metric">
            <span>Mobile money collected</span>
            <strong id="mobile-collected">$0</strong>
        </div>
        <div class="metric">
            <span>Tips earned</span>
            <strong id="tips">$0</strong>
        </div>
        <div class="metric">
            <span>Refunds issued</span>
            <strong id="refunds">$0</strong>
        </div>

        <div class="total-row">
            <span>Net handled</span>
            <strong id="net">$0</strong>
        </div>

        <div class="note-box">
            <label class="kv-label">Handover note</label>
            <textarea class="kv-textarea" id="handover-note" placeholder="Anything the next shift should know..."></textarea>
        </div>

        <button class="kv-button kv-button-accent btn" onclick="finish()">End shift and save report</button>
    </div>

    <a href="waitress-dashboard.html" class="back-link">← Back to dashboard</a>

    <script src="../korvia-ui.js"></script>
    <script>
        const session = JSON.parse(localStorage.getItem('korvia_staff_session') || '{}');
        const orders = JSON.parse(localStorage.getItem('korvia_orders') || '[]');
        const tips = JSON.parse(localStorage.getItem('korvia_tips') || '[]');

        function formatMoney(n) { return '$' + (n || 0).toFixed(2); }

        function render() {
            if (!session.startedAt) {
                document.querySelector('.report').innerHTML = '<h1>No active shift</h1><p class="subtitle">Start a shift from the staff login page.</p>';
                return;
            }

            const started = new Date(session.startedAt);
            const ended = session.endedAt ? new Date(session.endedAt) : new Date();
            const mins = Math.max(1, Math.floor((ended - started) / 60000));
            const breakMins = session.breakMinutes || 0;

            const myOrders = orders.filter(o => o.servedBy === session.handle || o.paymentBy === session.handle);
            const payments = myOrders.filter(o => o.status === 'paid').reduce((s, o) => s + o.total, 0);
            const cash = payments * 0.4; // demo split
            const mobile = payments * 0.6;
            const myTips = tips.filter(t => t.handle === session.handle).reduce((s, t) => s + (t.amount || 0), 0);
            const refunds = myOrders.filter(o => o.status === 'cancelled').reduce((s, o) => s + o.total, 0);
            const net = payments + myTips - refunds;

            document.getElementById('subtitle').textContent = `${session.name} (${session.handle}) at ${session.venue}`;
            document.getElementById('started').textContent = started.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('ended').textContent = session.endedAt ? ended.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'Now';
            document.getElementById('duration').textContent = `${mins} min`;
            document.getElementById('break-time').textContent = `${breakMins} min`;
            document.getElementById('orders-served').textContent = myOrders.filter(o => o.status === 'done' || o.status === 'paid').length;
            document.getElementById('payments-collected').textContent = formatMoney(payments);
            document.getElementById('cash-collected').textContent = formatMoney(cash);
            document.getElementById('mobile-collected').textContent = formatMoney(mobile);
            document.getElementById('tips').textContent = formatMoney(myTips);
            document.getElementById('refunds').textContent = formatMoney(refunds);
            document.getElementById('net').textContent = formatMoney(net);
        }

        function finish() {
            const note = document.getElementById('handover-note').value;
            const report = {
                ...session,
                endedAt: new Date().toISOString(),
                handoverNote: note,
                breakMinutes: session.breakMinutes || 0
            };
            const history = JSON.parse(localStorage.getItem('korvia_shift_history') || '[]');
            history.unshift(report);
            localStorage.setItem('korvia_shift_history', JSON.stringify(history));
            localStorage.removeItem('korvia_staff_session');
            alert('Shift ended and report saved.');
            window.location.href = 'staff-login.html';
        }

        render();
    </script>
</body>
</html>
