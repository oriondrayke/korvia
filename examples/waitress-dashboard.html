<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitress Dashboard | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body { background: var(--kv-paper); }
        .wd-main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
        .shift-bar {
            background: var(--kv-card);
            border-bottom: 1px solid var(--kv-rule);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .shift-bar span { font-size: 0.85rem; color: var(--kv-ink-muted); }
        .shift-bar .actions { display: flex; gap: 8px; }
        .wd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .wd-card h2 {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--kv-ink-muted);
            margin-bottom: 8px;
        }
        .wd-card .number {
            font-family: var(--kv-font-serif);
            font-size: 1.9rem;
            color: var(--kv-ink);
        }
        .order-card {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 16px;
            margin-bottom: 16px;
            border-left: 3px solid var(--kv-accent);
        }
        .order-card.ready { border-left-color: var(--kv-success); }
        .order-card.new { border-left-color: var(--kv-info); }
        .order-card.served { border-left-color: var(--kv-rule-strong); opacity: 0.75; }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .order-header strong { font-size: 1.05rem; }
        .order-status {
            font-size: 0.65rem;
            padding: 4px 8px;
            border: 1px solid var(--kv-rule-strong);
            border-radius: var(--kv-radius);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--kv-paper);
            color: var(--kv-ink-muted);
        }
        .order-items { font-size: 0.9rem; color: var(--kv-ink-muted); margin-bottom: 12px; }
        .order-total { font-weight: 700; color: var(--kv-accent); }
        .order-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
        .section-title {
            font-family: var(--kv-font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .tables-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .table-chip {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 14px;
            text-align: center;
            border-left: 3px solid var(--kv-rule-strong);
        }
        .table-chip.active { border-left-color: var(--kv-success); }
        .table-chip.call { border-left-color: var(--kv-accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .table-chip h4 { font-size: 0.95rem; margin-bottom: 2px; }
        .table-chip p { font-size: 0.7rem; color: var(--kv-ink-muted); margin: 0; }
        .request-card {
            background: var(--kv-accent-soft);
            border: 1px solid var(--kv-accent);
            border-radius: var(--kv-radius);
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .audit-tag {
            font-size: 0.75rem;
            color: var(--kv-ink-muted);
            margin-top: 8px;
        }
        .idle-warning {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--kv-warning-soft);
            color: var(--kv-warning);
            border: 1px solid var(--kv-warning);
            padding: 12px 16px;
            border-radius: var(--kv-radius);
            display: none;
            font-size: 0.9rem;
            z-index: 100;
        }
    </style>
</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Waitress Dashboard
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <div class="shift-bar" id="shift-bar">
        <span id="shift-info">No active shift</span>
        <div class="actions">
            <button class="kv-button kv-button-sm kv-button-secondary" id="break-btn" onclick="toggleBreak()">Start break</button>
            <button class="kv-button kv-button-sm kv-button-accent" onclick="endShift()">End shift</button>
        </div>
    </div>

    <main class="wd-main">
        <a href="../index.html" class="back-link">← Back to Korvia</a>

        <div class="wd-grid">
            <div class="kv-card wd-card">
                <h2>Active orders</h2>
                <div class="number" id="active-tables">0</div>
            </div>
            <div class="kv-card wd-card">
                <h2>Orders to serve</h2>
                <div class="number" id="ready-orders">0</div>
            </div>
            <div class="kv-card wd-card">
                <h2>Served this shift</h2>
                <div class="number" id="served-count">0</div>
            </div>
            <div class="kv-card wd-card">
                <h2>Tips this shift</h2>
                <div class="number" id="tips-total">$0</div>
            </div>
        </div>

        <h2 class="section-title">All tables</h2>
        <div class="tables-grid" id="all-tables"></div>

        <h2 class="section-title">Customer requests</h2>
        <div id="requests-list"></div>

        <h2 class="section-title">All live orders</h2>
        <div id="orders-list"></div>
    </main>

    <div class="idle-warning" id="idle-warning">Idle timeout soon. Tap anywhere to stay logged in.</div>

    <script src="../korvia-ui.js"></script>
    <script>
        const STORAGE_KEY = 'korvia_orders';
        const session = JSON.parse(localStorage.getItem('korvia_staff_session') || 'null');

        if (!session) {
            window.location.href = 'staff-login.html';
        }

        function loadOrders() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
        }

        function updateStatus(id, status) {
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = status;
                if (status === 'done') order.servedBy = session.handle;
                if (status === 'paid') order.paymentBy = session.handle;
                order.statusHistory = order.statusHistory || [];
                order.statusHistory.push({ status, by: session.handle, at: new Date().toISOString() });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            }
            render();
        }

        function addTip(orderId) {
            const amount = parseFloat(prompt('Tip amount:', '2')) || 0;
            if (amount <= 0) return;
            const tips = JSON.parse(localStorage.getItem('korvia_tips') || '[]');
            tips.push({ orderId, amount, handle: session.handle, at: new Date().toISOString() });
            localStorage.setItem('korvia_tips', JSON.stringify(tips));
            render();
        }

        function timeSince(iso) {
            const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000 / 60);
            return diff < 1 ? 'just now' : `${diff} min ago`;
        }

        const myTables = session?.assignedTables || ['1', '2', '3', '4'];
        let requests = JSON.parse(localStorage.getItem('korvia_waitress_requests') || '[]');

        function renderShiftBar() {
            if (!session) return;
            const started = new Date(session.startedAt);
            const mins = Math.floor((Date.now() - started.getTime()) / 60000);
            const breakText = session.onBreak ? ' • ON BREAK' : '';
            document.getElementById('shift-info').innerHTML =
                `<strong>${session.name}</strong> (${session.handle}) at ${session.venue} • on duty ${mins} min${breakText}`;
            document.getElementById('break-btn').textContent = session.onBreak ? 'End break' : 'Start break';
        }

        function toggleBreak() {
            session.onBreak = !session.onBreak;
            if (session.onBreak) {
                session.breakStartedAt = new Date().toISOString();
            } else if (session.breakStartedAt) {
                const mins = Math.floor((Date.now() - new Date(session.breakStartedAt).getTime()) / 60000);
                session.breakMinutes = (session.breakMinutes || 0) + mins;
                delete session.breakStartedAt;
            }
            localStorage.setItem('korvia_staff_session', JSON.stringify(session));
            renderShiftBar();
        }

        function endShift() {
            if (!confirm('End your shift and open the shift report?')) return;
            window.location.href = 'shift-report.html';
        }

        function resolveRequest(id) {
            requests = requests.map(r => r.id === id ? { ...r, resolved: true } : r);
            localStorage.setItem('korvia_waitress_requests', JSON.stringify(requests));
            render();
        }

        function render() {
            renderShiftBar();
            const orders = loadOrders();
            const active = orders.filter(o => o.status !== 'done' && o.status !== 'paid');
            const ready = orders.filter(o => o.status === 'ready');
            const served = orders.filter(o => o.servedBy === session.handle && o.status === 'paid');
            const tips = JSON.parse(localStorage.getItem('korvia_tips') || '[]');
            const myTips = tips.filter(t => t.handle === session.handle).reduce((s, t) => s + t.amount, 0);

            document.getElementById('active-tables').textContent = active.length;
            document.getElementById('ready-orders').textContent = ready.length;
            document.getElementById('served-count').textContent = served.length;
            document.getElementById('tips-total').textContent = '$' + myTips.toFixed(0);

            const allTables = ['1', '2', '3', '4', '5', '6', '7', '8'];
            document.getElementById('all-tables').innerHTML = allTables.map(t => {
                const hasCall = requests.some(r => r.table === t && !r.resolved);
                const isActive = active.some(o => o.spot === t);
                const isMine = myTables.includes(t);
                return `
                    <div class="table-chip ${isActive ? 'active' : ''} ${hasCall ? 'call' : ''}">
                        <h4>Table ${t}${isMine ? ' • You' : ''}</h4>
                        <p>${hasCall ? 'Needs help' : isActive ? 'Active' : 'Free'}</p>
                    </div>
                `;
            }).join('');

            document.getElementById('requests-list').innerHTML = requests.filter(r => !r.resolved).length ? requests.filter(r => !r.resolved).map(r => `
                <div class="request-card">
                    <div>
                        <strong>Table ${r.table}</strong>
                        <p style="font-size:0.85rem;color:var(--kv-ink-muted);margin:0;">${r.message}</p>
                    </div>
                    <button class="kv-button kv-button-sm kv-button-accent" onclick="resolveRequest('${r.id}')">Done</button>
                </div>
            `).join('') : '<p style="color:var(--kv-ink-muted);">No open requests.</p>';

            document.getElementById('orders-list').innerHTML = active.length ? active.map(o => `
                <div class="order-card ${o.status}">
                    <div class="order-header">
                        <div>
                            <strong>${o.spotType === 'hotel' ? 'Room' : o.spotType === 'events' ? 'Stall' : 'Table'} ${o.spot}</strong>
                            ${myTables.includes(o.spot) ? '<span class="kv-badge kv-badge-accent" style="margin-left:8px;">Yours</span>' : ''}
                        </div>
                        <span class="order-status">${o.status}</span>
                    </div>
                    <div class="order-items">${o.items.map(i => `${i.name} ×${i.quantity}`).join(', ')}</div>
                    <div class="order-total">$${o.total.toFixed(2)}</div>
                    <div class="order-actions">
                        ${o.status === 'ready' ? `<button class="kv-button kv-button-sm" onclick="updateStatus('${o.id}', 'done')">Mark served</button>` : ''}
                        ${o.status === 'done' ? `<button class="kv-button kv-button-sm kv-button-accent" onclick="updateStatus('${o.id}', 'paid')">Collect payment</button>` : ''}
                        ${o.status === 'paid' ? `<button class="kv-button kv-button-sm kv-button-secondary" onclick="addTip('${o.id}')">Add tip</button>` : ''}
                    </div>
                    ${o.servedBy || o.paymentBy ? `<div class="audit-tag">${o.servedBy ? 'Served by ' + o.servedBy : ''}${o.paymentBy ? (o.servedBy ? ' · ' : '') + 'Paid by ' + o.paymentBy : ''}</div>` : ''}
                </div>
            `).join('') : '<p style="color:var(--kv-ink-muted);">No live orders.</p>';
        }

        // Idle warning
        let idleTimer;
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                document.getElementById('idle-warning').style.display = 'block';
            }, 4 * 60 * 1000);
        }
        document.addEventListener('click', () => {
            document.getElementById('idle-warning').style.display = 'none';
            resetIdleTimer();
        });
        resetIdleTimer();

        render();
        setInterval(render, 3000);
    </script>
</body>
</html>
