<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body { background: var(--kv-paper); }
        .kd-main { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .kd-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .kd-header h1 {
            font-family: var(--kv-font-serif);
            font-size: 1.6rem;
            font-weight: 400;
        }
        .kd-stats { display: flex; gap: 10px; }
        .kd-stat {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            padding: 8px 14px;
            border-radius: var(--kv-radius);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .kd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .ticket {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 20px;
            border-left: 4px solid var(--kv-accent);
        }
        .ticket.new { border-left-color: var(--kv-info); }
        .ticket.preparing { border-left-color: var(--kv-warning); }
        .ticket.ready { border-left-color: var(--kv-success); }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .ticket-id { font-weight: 700; }
        .ticket-table { font-size: 0.85rem; color: var(--kv-ink-muted); }
        .ticket-time { font-size: 0.75rem; color: var(--kv-ink-muted); margin-bottom: 14px; }
        .ticket-items { margin-bottom: 14px; }
        .ticket-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed var(--kv-rule);
            font-size: 0.95rem;
        }
        .ticket-item:last-child { border-bottom: none; }
        .ticket-total {
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--kv-accent);
        }
        .ticket-actions { display: flex; gap: 8px; }
        .ticket-actions button { flex: 1; }
        .empty {
            text-align: center;
            padding: 4rem;
            color: var(--kv-ink-muted);
            border: 1px dashed var(--kv-rule);
            border-radius: var(--kv-radius);
        }
        .back {
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back:hover { color: var(--kv-accent); }
    </style>
</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Kitchen Display
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <main class="kd-main">
        <div class="kd-header">
            <div>
                <a href="../index.html" class="back">← Korvia</a>
                <h1>Kitchen Display</h1>
            </div>
            <div class="kd-stats">
                <div class="kd-stat">New: <span id="count-new">0</span></div>
                <div class="kd-stat">Preparing: <span id="count-prep">0</span></div>
                <div class="kd-stat">Ready: <span id="count-ready">0</span></div>
            </div>
        </div>

        <div class="kd-grid" id="tickets"></div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        const STORAGE_KEY = 'korvia_orders';

        function loadOrders() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').filter(o => o.status !== 'done');
        }

        function updateStatus(id, status) {
            const session = JSON.parse(localStorage.getItem('korvia_staff_session') || 'null');
            const orders = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const order = orders.find(o => o.id === id);
            if (order) {
                order.status = status;
                order.statusHistory = order.statusHistory || [];
                order.statusHistory.push({ status, by: session?.handle || 'kitchen', at: new Date().toISOString() });
                if (status === 'ready') order.readyBy = session?.handle;
                if (status === 'done') order.doneBy = session?.handle;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
            }
            render();
        }

        function timeSince(iso) {
            const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000 / 60);
            return diff < 1 ? 'just now' : `${diff} min ago`;
        }

        function render() {
            const orders = loadOrders();
            const container = document.getElementById('tickets');

            document.getElementById('count-new').textContent = orders.filter(o => o.status === 'new').length;
            document.getElementById('count-prep').textContent = orders.filter(o => o.status === 'preparing').length;
            document.getElementById('count-ready').textContent = orders.filter(o => o.status === 'ready').length;

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty">No active orders.</div>';
                return;
            }

            container.innerHTML = orders.map(order => `
                <article class="ticket ${order.status}">
                    <div class="ticket-header">
                        <span class="ticket-id">${order.id.split('-')[1].slice(-4)}</span>
                        <span class="ticket-table">${order.spotType === 'hotel' ? 'Room' : order.spotType === 'events' ? 'Stall' : 'Table'} ${order.spot}</span>
                    </div>
                    <div class="ticket-time">${timeSince(order.createdAt)}</div>
                    <div class="ticket-items">
                        ${order.items.map(i => `
                            <div class="ticket-item"><span>${i.name}</span><span>$${i.price.toFixed(2)}</span></div>
                        `).join('')}
                    </div>
                    <div class="ticket-total">Total: $${order.total.toFixed(2)}</div>
                    ${order.servedBy ? `<div style="font-size:0.8rem;color:var(--kv-ink-muted);margin-bottom:8px;">Served by ${order.servedBy}</div>` : ''}
                    ${order.readyBy ? `<div style="font-size:0.8rem;color:var(--kv-ink-muted);margin-bottom:8px;">Ready by ${order.readyBy}</div>` : ''}
                    <div class="ticket-actions">
                        ${order.status === 'new' ? `<button class="kv-button kv-button-sm" onclick="updateStatus('${order.id}', 'preparing')">Start preparing</button>` : ''}
                        ${order.status === 'preparing' ? `<button class="kv-button kv-button-sm kv-button-accent" onclick="updateStatus('${order.id}', 'ready')">Mark ready</button>` : ''}
                        ${order.status === 'ready' ? `<button class="kv-button kv-button-sm kv-button-secondary" onclick="updateStatus('${order.id}', 'done')">Served / Done</button>` : ''}
                    </div>
                </article>
            `).join('');
        }

        render();
        setInterval(render, 3000);
    </script>
</body>
</html>
