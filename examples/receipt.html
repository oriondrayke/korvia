<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: var(--kv-paper); }
        .receipt-page { max-width: 500px; margin: 0 auto; padding: 32px 24px; }
        .receipt-card {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .receipt-header { text-align: center; margin-bottom: 24px; }
        .receipt-header h1 {
            font-family: var(--kv-font-serif);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 4px;
        }
        .receipt-header p { color: var(--kv-ink-muted); font-size: 0.9rem; }
        .success-badge {
            display: inline-block;
            background: var(--kv-success-soft);
            color: var(--kv-success);
            border: 1px solid var(--kv-success);
            padding: 6px 14px;
            border-radius: var(--kv-radius);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }
        .receipt-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--kv-rule); }
        .receipt-row.total {
            font-weight: 700;
            font-size: 1.1rem;
            border-top: 2px solid var(--kv-ink);
            border-bottom: none;
            margin-top: 8px;
            padding-top: 12px;
        }
        .qr-box { text-align: center; padding: 16px; }
        .qr-box p { font-size: 0.85rem; color: var(--kv-ink-muted); margin-top: 12px; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .feedback-stars { display: flex; gap: 8px; justify-content: center; font-size: 2rem; margin: 16px 0; }
        .star { cursor: pointer; opacity: 0.3; color: var(--kv-warning); }
        .star.active { opacity: 1; }
        .tip-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
    </style>
</head>
<body class="kv-ruled-subtle">
    <div class="receipt-page">
        <a href="qr-menu.html" class="back-link">← Back to menu</a>

        <div class="receipt-card">
            <div class="receipt-header">
                <div class="success-badge">Order placed</div>
                <h1 id="venue-name">Sunset Bistro</h1>
                <p id="spot-info">Table 12</p>
                <p id="order-id" style="font-size:0.8rem;color:var(--kv-ink-muted);"></p>
            </div>

            <div id="items-list"></div>

            <div class="receipt-row">
                <span>Subtotal</span>
                <span id="r-subtotal">$0.00</span>
            </div>
            <div class="receipt-row">
                <span>Tip</span>
                <span id="r-tip">$0.00</span>
            </div>
            <div class="receipt-row">
                <span>Discount</span>
                <span id="r-discount">$0.00</span>
            </div>
            <div class="receipt-row total">
                <span>Total paid</span>
                <span id="r-total">$0.00</span>
            </div>

            <div class="qr-box">
                <div id="receipt-qr"></div>
                <p>Scan for digital receipt, re-order, or feedback.</p>
            </div>
        </div>

        <div class="receipt-card">
            <h2 style="text-align:center;margin-bottom:6px;">Tip your server</h2>
            <p style="text-align:center;font-size:0.85rem;color:var(--kv-ink-muted);margin-bottom:16px;">100% goes to the staff who served you.</p>
            <div class="tip-btns">
                <button class="kv-button kv-button-sm kv-button-secondary" onclick="addExtraTip(2)">$2</button>
                <button class="kv-button kv-button-sm kv-button-secondary" onclick="addExtraTip(5)">$5</button>
                <button class="kv-button kv-button-sm kv-button-secondary" onclick="addExtraTip(10)">$10</button>
            </div>
        </div>

        <div class="receipt-card">
            <h2 style="text-align:center;margin-bottom:6px;">How was your experience?</h2>
            <div class="feedback-stars">
                <span class="star" onclick="setRating(1)">★</span>
                <span class="star" onclick="setRating(2)">★</span>
                <span class="star" onclick="setRating(3)">★</span>
                <span class="star" onclick="setRating(4)">★</span>
                <span class="star" onclick="setRating(5)">★</span>
            </div>
            <textarea class="kv-textarea" id="feedback-text" placeholder="Tell us what you liked or how we can improve..."></textarea>
            <button class="kv-button" style="width:100%;margin-top:12px;" onclick="submitFeedback()">Send feedback</button>
        </div>

        <div class="action-grid">
            <button class="kv-button kv-button-secondary" onclick="downloadReceipt()">Download receipt</button>
            <button class="kv-button kv-button-accent" onclick="reorder()">Order again</button>
        </div>
    </div>

    <script src="../korvia-ui.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order');
        const orders = JSON.parse(localStorage.getItem('korvia_orders') || '[]');
        const order = orders.find(o => o.id === orderId);

        if (!order) {
            document.body.innerHTML = '<div style="padding:2rem;text-align:center;">Order not found. <a href="qr-menu.html">Back to menu</a></div>';
            throw new Error('Order not found');
        }

        document.getElementById('venue-name').textContent = order.venue.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        document.getElementById('spot-info').textContent = `${order.spotType === 'hotel' ? 'Room' : order.spotType === 'events' ? 'Stall' : 'Table'} ${order.spot}`;
        document.getElementById('order-id').textContent = order.id;

        const grouped = {};
        order.items.forEach(i => {
            if (!grouped[i.name]) grouped[i.name] = { ...i, qty: 0 };
            grouped[i.name].qty++;
        });

        document.getElementById('items-list').innerHTML = Object.values(grouped).map(item => `
            <div class="receipt-row">
                <span>${item.name} x ${item.qty}</span>
                <span>$${(item.price * item.qty).toFixed(2)}</span>
            </div>
        `).join('');

        document.getElementById('r-subtotal').textContent = '$' + order.subtotal.toFixed(2);
        document.getElementById('r-tip').textContent = '$' + order.tip.toFixed(2);
        document.getElementById('r-discount').textContent = '-$' + order.discount.toFixed(2);
        document.getElementById('r-total').textContent = '$' + order.total.toFixed(2);

        new QRCode(document.getElementById('receipt-qr'), {
            text: window.location.href,
            width: 140,
            height: 140,
            colorDark: '#1c1917',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });

        let rating = 0;
        function setRating(n) {
            rating = n;
            document.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < n));
        }

        function addExtraTip(amount) {
            const tips = JSON.parse(localStorage.getItem('korvia_tips') || '[]');
            tips.push({ orderId: order.id, amount, venue: order.venue, spot: order.spot, time: new Date().toISOString() });
            localStorage.setItem('korvia_tips', JSON.stringify(tips));
            alert(`Thank you for the $${amount} tip!`);
        }

        function submitFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            if (!rating && !text) {
                alert('Please rate or write something.');
                return;
            }
            const feedback = JSON.parse(localStorage.getItem('korvia_feedback') || '[]');
            feedback.push({ orderId: order.id, venue: order.venue, rating, text, time: new Date().toISOString() });
            localStorage.setItem('korvia_feedback', JSON.stringify(feedback));
            alert('Thank you for your feedback!');
            document.getElementById('feedback-text').value = '';
        }

        function downloadReceipt() {
            alert('Receipt download coming in full version.');
        }

        function reorder() {
            window.location.href = `qr-menu.html?venue=${order.venue}&type=${order.spotType}&spot=${order.spot}`;
        }
    </script>
</body>
</html>
