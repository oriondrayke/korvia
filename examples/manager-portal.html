<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Portal | Korvia QR</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .corner-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 150;
        }
        .login-box {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
        }
        .login-box h1 {
            font-family: var(--kv-font-serif);
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .login-box p {
            color: var(--kv-ink-muted);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .form-group { margin-bottom: 16px; }
        .login-btn { width: 100%; margin-top: 8px; }
    </style>
</head>
<body class="kv-ruled-subtle">
    <div class="corner-controls">
        <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
            <div class="kv-theme-slider"></div>
            <button class="kv-theme-option" data-value="light">Light</button>
            <button class="kv-theme-option" data-value="dark">Dark</button>
            <button class="kv-theme-option" data-value="auto">Auto</button>
        </div>
    </div>

    <div class="login-box">
        <div class="kv-logo" style="margin-bottom: 20px;">
            <span class="kv-logo-mark">K</span>
            korvia QR.
        </div>
        <h1>Manager Portal</h1>
        <p>Log in to manage menu, staff, and daily operations.</p>
        <form onsubmit="event.preventDefault(); alert('Manager dashboard coming next.');">
            <div class="form-group">
                <label class="kv-label">Email</label>
                <input type="email" class="kv-input" placeholder="manager@restaurant.com">
            </div>
            <div class="form-group">
                <label class="kv-label">Password</label>
                <input type="password" class="kv-input" placeholder="••••••••">
            </div>
            <button type="submit" class="kv-button login-btn">Enter manager dashboard</button>
        </form>
    </div>

    <script src="../korvia-ui.js"></script>
</body>
</html>
