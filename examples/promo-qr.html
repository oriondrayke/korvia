<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo QR Generator | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: var(--kv-paper); }
        .promo-main { max-width: 700px; margin: 0 auto; padding: 32px 24px; }
        .panel {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .panel h2 {
            font-family: var(--kv-font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .form-group { margin-bottom: 16px; }
        .promo-btn { width: 100%; }
        .qr-result { text-align: center; display: none; }
        .qr-result.active { display: block; }
        .qr-box {
            display: inline-block;
            padding: 20px;
            background: var(--kv-paper);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            margin: 16px 0;
        }
        .qr-actions { display: flex; gap: 10px; justify-content: center; }
        .use-cases { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .use-case {
            background: var(--kv-paper);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 16px;
            font-size: 0.9rem;
            color: var(--kv-ink-muted);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
    </style>

    <!-- Admin auth guard -->
    <script>
    (function() {
        const allowed = ["manager", "owner"];
        const session = JSON.parse(localStorage.getItem('korvia_admin_session') || 'null');
        const currentRole = session && session.role;
        if (!currentRole || !allowed.includes(currentRole)) {
            window.location.replace('admin-login.html?role=manager');
        }
    })();
    </script>

</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Promo QR Generator
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <main class="promo-main">
        <a href="../index.html" class="back-link">← Back to Korvia</a>

        <div class="panel">
            <h2>Build your promo</h2>
            <div class="form-group">
                <label class="kv-label">Campaign name</label>
                <input type="text" class="kv-input" id="campaign" placeholder="e.g. Weekend Special">
            </div>
            <div class="form-group">
                <label class="kv-label">Discount type</label>
                <select class="kv-select" id="discount-type">
                    <option value="percent">Percentage off</option>
                    <option value="fixed">Fixed amount off</option>
                    <option value="free">Free item</option>
                </select>
            </div>
            <div class="form-group">
                <label class="kv-label">Value</label>
                <input type="text" class="kv-input" id="discount-value" placeholder="e.g. 20 for 20% or $20 off">
            </div>
            <div class="form-group">
                <label class="kv-label">Promo code</label>
                <input type="text" class="kv-input" id="promo-code" placeholder="e.g. WEEKEND20">
            </div>
            <button class="kv-button kv-button-accent promo-btn" onclick="generatePromoQR()">Generate promo QR</button>
        </div>

        <div class="panel qr-result" id="qr-result">
            <h2>Your promo QR</h2>
            <div class="qr-box" id="qrcode"></div>
            <p style="color:var(--kv-ink-muted);font-size:0.85rem;word-break:break-all;" id="qr-url"></p>
            <div class="qr-actions">
                <button class="kv-button kv-button-secondary" onclick="downloadQR()">Download</button>
                <button class="kv-button kv-button-secondary" onclick="printQR()">Print</button>
            </div>
        </div>

        <div class="panel">
            <h2>Use cases</h2>
            <div class="use-cases">
                <div class="use-case">🪧 Table tents with "Scan for 10% off"</div>
                <div class="use-case">📱 Instagram story QR promos</div>
                <div class="use-case">🎟️ Event tickets with drink voucher</div>
                <div class="use-case">🎂 Birthday discount for loyal guests</div>
            </div>
        </div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        let currentQR = null;

        function generatePromoQR() {
            const campaign = document.getElementById('campaign').value.trim() || 'Promo';
            const type = document.getElementById('discount-type').value;
            const value = document.getElementById('discount-value').value.trim() || '0';
            const code = document.getElementById('promo-code').value.trim().toUpperCase() || 'KORVIA';

            const baseUrl = 'https://oriondrayke.github.io/korvia/examples/qr-menu.html';
            const params = new URLSearchParams();
            params.set('promo', code);
            params.set('discountType', type);
            params.set('discountValue', value);
            params.set('campaign', campaign);

            const url = `${baseUrl}?${params.toString()}`;

            document.getElementById('qrcode').innerHTML = '';
            currentQR = new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#1c1917',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('qr-url').textContent = url;
            document.getElementById('qr-result').classList.add('active');

            const promos = JSON.parse(localStorage.getItem('korvia_promos') || '[]');
            promos.push({ campaign, type, value, code, createdAt: new Date().toISOString() });
            localStorage.setItem('korvia_promos', JSON.stringify(promos));
        }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (!img) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'korvia-promo-qr.png';
            link.click();
        }

        function printQR() {
            window.print();
        }
    </script>
</body>
</html>
