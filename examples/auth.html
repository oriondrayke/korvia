<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korvia — Account</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--kv-font-sans);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-box {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1.25rem;
            padding: 2rem;
        }
        .auth-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            border-radius: 1rem;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
        }
        .auth-box h1 { text-align: center; font-size: 1.4rem; margin-bottom: 0.25rem; }
        .auth-box .subtitle { text-align: center; opacity: 0.7; margin-bottom: 1.5rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
        }
        .tab.active { background: #f97316; border-color: #f97316; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; opacity: 0.9; }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 1rem;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.4); }
        .otp-row { display: flex; gap: 0.5rem; }
        .otp-row input { flex: 1; }
        .otp-row button {
            padding: 0 1rem;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .auth-btn {
            width: 100%;
            background: #f97316;
            color: white;
            border: none;
            padding: 0.85rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .back-link {
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #f97316; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-box">
        <div class="auth-logo">K</div>
        <h1 id="portal-title"><span>Restaurant</span> Account</h1>
        <p class="subtitle" id="subtitle">Existing account or register new venue</p>

        <div class="tabs" id="tabs">
            <div class="tab active" onclick="setMode('login')">Existing</div>
            <div class="tab" onclick="setMode('register')">Register new</div>
        </div>

        <form id="auth-form" onsubmit="event.preventDefault(); handleSubmit();">
            <div class="form-group hidden" id="venue-group">
                <label>Venue name</label>
                <input type="text" id="venue-name" placeholder="e.g. Sunset Bistro">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@venue.com" required>
            </div>
            <div class="form-group hidden" id="username-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>OTP code</label>
                <div class="otp-row">
                    <input type="text" id="otp" placeholder="123456" maxlength="6">
                    <button type="button" onclick="sendOTP()">Send</button>
                </div>
            </div>
            <button type="submit" class="auth-btn" id="submit-btn">Log in</button>
        </form>
    </div>

    <a href="../index.html" class="back-link">← Back to Korvia</a>

    <script>
        const params = new URLSearchParams(window.location.search);
        const portal = params.get('portal') || 'restaurant';
        const title = portal.charAt(0).toUpperCase() + portal.slice(1);
        document.getElementById('portal-title').innerHTML = `<span>${title}</span> Account`;

        let mode = 'login';

        if (portal === 'events') {
            document.getElementById('tabs').style.display = 'none';
            document.getElementById('subtitle').textContent = 'Register your event to start taking orders';
            mode = 'register';
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(mode === 'login' ? 'existing' : 'register')));
            document.getElementById('venue-group').classList.toggle('hidden', mode === 'login');
            document.getElementById('username-group').classList.toggle('hidden', mode === 'login');
            document.getElementById('submit-btn').textContent = mode === 'login' ? 'Log in' : 'Create account';
        }

        function sendOTP() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Enter your email first.');
                return;
            }
            const code = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('korvia_otp', code);
            alert(`Demo OTP sent to ${email}: ${code}`);
        }

        function handleSubmit() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const storedOTP = localStorage.getItem('korvia_otp') || '123456';

            if (otp !== storedOTP) {
                alert('Invalid OTP. Use 123456 or click Send to get a demo code.');
                return;
            }

            if (mode === 'register') {
                const venue = document.getElementById('venue-name').value;
                const username = document.getElementById('username').value;
                if (!venue || !username) {
                    alert('Fill in venue name and username.');
                    return;
                }
                localStorage.setItem('korvia_session', JSON.stringify({ email, venue, portal, username }));
            } else {
                localStorage.setItem('korvia_session', JSON.stringify({ email, portal }));
            }

            window.location.href = `role-select.html?portal=${portal}`;
        }

        setMode(mode);
    </script>
</body>
</html>
