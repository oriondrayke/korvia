<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korvia — Account</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .corner-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 150;
        }
        .auth-box {
            width: 100%;
            max-width: 420px;
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 32px;
        }
        .auth-logo {
            width: 52px;
            height: 52px;
            border: 2px solid var(--kv-accent);
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            font-family: var(--kv-font-serif);
            font-size: 1.5rem;
            color: var(--kv-accent);
            border-radius: var(--kv-radius);
        }
        .auth-box h1 {
            text-align: center;
            font-family: var(--kv-font-serif);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .auth-box .subtitle {
            text-align: center;
            color: var(--kv-ink-muted);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--kv-paper);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--kv-ink-muted);
            transition: all 150ms ease;
        }
        .tab.active {
            background: var(--kv-ink);
            border-color: var(--kv-ink);
            color: var(--kv-paper);
        }
        .form-group { margin-bottom: 16px; }
        .otp-row { display: flex; gap: 8px; }
        .otp-row input { flex: 1; }
        .otp-row button {
            padding: 0 14px;
            background: var(--kv-card);
            border: 1px solid var(--kv-rule-strong);
            color: var(--kv-ink);
            border-radius: var(--kv-radius);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 150ms ease;
        }
        .otp-row button:hover { border-color: var(--kv-ink); }
        .auth-btn {
            width: 100%;
            margin-top: 8px;
        }
        .back-link {
            margin-top: 24px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 14px;
            border: 1px solid var(--kv-rule-strong);
            border-radius: var(--kv-radius);
            transition: all 150ms ease;
        }
        .back-link:hover {
            color: var(--kv-ink);
            border-color: var(--kv-ink);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="kv-ruled-subtle">
    <div class="corner-controls">
        <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
            <div class="kv-theme-slider"></div>
            <button class="kv-theme-option" data-value="light">Light</button>
            <button class="kv-theme-option" data-value="dark">Dark</button>
            <button class="kv-theme-option" data-value="auto">Auto</button>
        </div>
    </div>

    <div class="auth-box">
        <div class="auth-logo">K</div>
        <h1 id="portal-title"><span>Restaurant</span> Account</h1>
        <p class="subtitle" id="subtitle">Existing account or register new venue</p>

        <div class="tabs" id="tabs">
            <div class="tab active" onclick="setMode('login')">Existing</div>
            <div class="tab" onclick="setMode('register')">Register new</div>
        </div>

        <form id="auth-form" onsubmit="event.preventDefault(); handleSubmit();">
            <div class="form-group hidden" id="venue-group">
                <label class="kv-label">Venue name</label>
                <input type="text" class="kv-input" id="venue-name" placeholder="e.g. Sunset Bistro">
            </div>
            <div class="form-group">
                <label class="kv-label">Email</label>
                <input type="email" class="kv-input" id="email" placeholder="you@venue.com" required>
            </div>
            <div class="form-group hidden" id="username-group">
                <label class="kv-label">Username</label>
                <input type="text" class="kv-input" id="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="kv-label">Password</label>
                <input type="password" class="kv-input" id="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label class="kv-label">OTP code</label>
                <div class="otp-row">
                    <input type="text" class="kv-input" id="otp" placeholder="123456" maxlength="6">
                    <button type="button" onclick="sendOTP()">Send</button>
                </div>
            </div>
            <button type="submit" class="kv-button kv-button-accent auth-btn" id="submit-btn">Log in</button>
        </form>
    </div>

    <a href="../index.html" class="back-link">← Back to Korvia</a>

    <script src="../korvia-ui.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const portal = params.get('portal') || 'restaurant';
        const title = portal.charAt(0).toUpperCase() + portal.slice(1);
        document.getElementById('portal-title').innerHTML = `\u003cspan\u003e${title}\u003c/span\u003e Account`;

        let mode = 'login';

        if (portal === 'events') {
            document.getElementById('tabs').style.display = 'none';
            document.getElementById('subtitle').textContent = 'Register your event to start taking orders';
            mode = 'register';
        }

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(mode === 'login' ? 'existing' : 'register')));
            document.getElementById('venue-group').classList.toggle('hidden', mode === 'login');
            document.getElementById('username-group').classList.toggle('hidden', mode === 'login');
            document.getElementById('submit-btn').textContent = mode === 'login' ? 'Log in' : 'Create account';
        }

        function sendOTP() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Enter your email first.');
                return;
            }
            const code = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('korvia_otp', code);
            alert(`Demo OTP sent to ${email}: ${code}`);
        }

        function handleSubmit() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const otp = document.getElementById('otp').value;
            const storedOTP = localStorage.getItem('korvia_otp') || '123456';

            if (otp !== storedOTP) {
                alert('Invalid OTP. Use 123456 or click Send to get a demo code.');
                return;
            }

            if (mode === 'register') {
                const venue = document.getElementById('venue-name').value;
                const username = document.getElementById('username').value;
                if (!venue || !username) {
                    alert('Fill in venue name and username.');
                    return;
                }
                localStorage.setItem('korvia_session', JSON.stringify({ email, venue, portal, username }));
            } else {
                localStorage.setItem('korvia_session', JSON.stringify({ email, portal }));
            }

            window.location.href = `role-select.html?portal=${portal}`;
        }

        setMode(mode);
    </script>
</body>
</html>
