<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Portal | Korvia QR</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .corner-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 150;
        }
    </style>

    <!-- Admin auth guard -->
    <script>
    (function() {
        const allowed = ["owner"];
        const session = JSON.parse(localStorage.getItem('korvia_admin_session') || 'null');
        const currentRole = session && session.role;
        if (!currentRole || !allowed.includes(currentRole)) {
            window.location.replace('admin-login.html?role=owner');
        }
    })();
    </script>

</head>
<body class="kv-ruled-subtle">
    <div class="corner-controls">
        <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
            <div class="kv-theme-slider"></div>
            <button class="kv-theme-option" data-value="light">Light</button>
            <button class="kv-theme-option" data-value="dark">Dark</button>
            <button class="kv-theme-option" data-value="auto">Auto</button>
        </div>
    </div>

    <div class="kv-container kv-container-narrow">
        <div class="kv-card" style="text-align:center;">
            <div class="kv-logo" style="justify-content:center;margin-bottom:24px;">
                <span class="kv-logo-mark">K</span>
                korvia QR.
            </div>
            <h1 class="kv-title" style="margin-bottom:8px;">Owner Portal</h1>
            <p class="kv-text-muted" style="margin-bottom:24px;">Log in to view sales, earnings projections, and business analytics.</p>
            <form onsubmit="event.preventDefault(); alert('Owner dashboard coming next.');">
                <div style="margin-bottom:16px;text-align:left;">
                    <label class="kv-label">Email</label>
                    <input type="email" class="kv-input" placeholder="owner@restaurant.com">
                </div>
                <div style="margin-bottom:24px;text-align:left;">
                    <label class="kv-label">Password</label>
                    <input type="password" class="kv-input" placeholder="••••••••">
                </div>
                <button type="submit" class="kv-button kv-button-accent" style="width:100%;">Enter owner dashboard</button>
            </form>
        </div>
    </div>

    <script src="../korvia-ui.js"></script>
</body>
</html>
