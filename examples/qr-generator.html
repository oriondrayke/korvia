<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: var(--kv-paper); }
        .gen-main { max-width: 700px; margin: 0 auto; padding: 32px 24px; }
        .gen-card {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 24px;
            margin-bottom: 24px;
        }
        .gen-card h2 {
            font-family: var(--kv-font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .form-row { margin-bottom: 16px; }
        .gen-btn { width: 100%; }
        .qr-result {
            text-align: center;
            display: none;
        }
        .qr-result.active { display: block; }
        .qr-box {
            display: inline-block;
            padding: 20px;
            background: var(--kv-paper);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            margin-bottom: 16px;
        }
        .qr-url {
            font-size: 0.8rem;
            color: var(--kv-ink-muted);
            word-break: break-all;
            margin-bottom: 16px;
        }
        .qr-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
        .help-text {
            font-size: 0.85rem;
            color: var(--kv-ink-muted);
            margin-top: 4px;
        }
    </style>

    <!-- Admin auth guard -->
    <script>
    (function() {
        const allowed = ["manager", "owner"];
        const session = JSON.parse(localStorage.getItem('korvia_admin_session') || 'null');
        const currentRole = session && session.role;
        if (!currentRole || !allowed.includes(currentRole)) {
            window.location.replace('admin-login.html?role=manager');
        }
    })();
    </script>

</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                QR Code Generator
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <main class="gen-main">
        <a href="../index.html" class="back-link">← Back to Korvia</a>

        <div class="gen-card">
            <h2>Venue details</h2>
            <div class="form-row">
                <label class="kv-label">Venue type</label>
                <select class="kv-select" id="venue-type">
                    <option value="restaurant">Restaurant</option>
                    <option value="hotel">Hotel</option>
                    <option value="events">Event</option>
                </select>
            </div>
            <div class="form-row">
                <label class="kv-label">Venue name</label>
                <input type="text" class="kv-input" id="venue-name" placeholder="e.g. Sunset Bistro">
            </div>
            <div class="form-row">
                <label class="kv-label">Table / Room / Stall number</label>
                <input type="text" class="kv-input" id="spot-id" placeholder="e.g. 12">
                <p class="help-text">Leave blank for a general venue QR code.</p>
            </div>
            <button class="kv-button kv-button-accent gen-btn" onclick="generateQR()">Generate QR code</button>
        </div>

        <div class="gen-card qr-result" id="qr-result">
            <h2>Your QR code</h2>
            <div class="qr-box" id="qrcode"></div>
            <p class="qr-url" id="qr-url"></p>
            <div class="qr-actions">
                <button class="kv-button kv-button-secondary" onclick="downloadQR()">Download PNG</button>
                <button class="kv-button kv-button-secondary" onclick="printQR()">Print</button>
            </div>
        </div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        let currentQR = null;

        function generateQR() {
            const type = document.getElementById('venue-type').value;
            const name = document.getElementById('venue-name').value.trim() || 'venue';
            const spot = document.getElementById('spot-id').value.trim();

            const baseUrl = 'https://oriondrayke.github.io/korvia/examples/qr-menu.html';
            const params = new URLSearchParams();
            params.set('venue', name.toLowerCase().replace(/\s+/g, '-'));
            params.set('type', type);
            if (spot) params.set('spot', spot);

            const url = `${baseUrl}?${params.toString()}`;

            document.getElementById('qrcode').innerHTML = '';
            currentQR = new QRCode(document.getElementById('qrcode'), {
                text: url,
                width: 200,
                height: 200,
                colorDark: '#1c1917',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('qr-url').textContent = url;
            document.getElementById('qr-result').classList.add('active');
        }

        function downloadQR() {
            const img = document.querySelector('#qrcode img');
            if (!img) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = 'korvia-qr.png';
            link.click();
        }

        function printQR() {
            window.print();
        }
    </script>
</body>
</html>
