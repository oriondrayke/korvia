<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korvia — Admin Login</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .corner-controls {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 150;
        }
        .auth-box {
            width: 100%;
            max-width: 420px;
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 32px;
        }
        .auth-logo {
            width: 52px;
            height: 52px;
            background: var(--kv-card);
            border-left: 3px solid var(--kv-accent);
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            font-family: var(--kv-font-serif);
            font-size: 1.5rem;
            color: var(--kv-accent);
            clip-path: polygon(0% 2%, 100% 0%, 98% 100%, 2% 98%);
        }
        .auth-box h1 {
            text-align: center;
            font-family: var(--kv-font-serif);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 6px;
        }
        .auth-box .subtitle {
            text-align: center;
            color: var(--kv-ink-muted);
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .form-group { margin-bottom: 16px; }
        .hint {
            font-size: 0.8rem;
            color: var(--kv-ink-muted);
            margin-top: 4px;
        }
        .auth-btn {
            width: 100%;
            margin-top: 8px;
        }
        .alert {
            padding: 12px;
            border-radius: var(--kv-radius);
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
            background: var(--kv-danger-soft);
            color: var(--kv-danger);
            border: 1px solid var(--kv-danger);
        }
        .back-link {
            margin-top: 24px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 14px;
            border: 1px solid var(--kv-rule-strong);
            border-radius: var(--kv-radius);
            transition: all 150ms ease;
        }
        .back-link:hover {
            color: var(--kv-ink);
            border-color: var(--kv-ink);
        }
        .demo-creds {
            margin-top: 20px;
            padding: 14px;
            background: var(--kv-accent-soft);
            border: 1px solid var(--kv-rule-strong);
            border-radius: var(--kv-radius);
            font-size: 0.8rem;
            color: var(--kv-ink-muted);
        }
        .demo-creds strong { color: var(--kv-accent); }
    </style>
</head>
<body class="kv-ruled-subtle">
    <div class="corner-controls">
        <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
            <div class="kv-theme-slider"></div>
            <button class="kv-theme-option" data-value="light">Light</button>
            <button class="kv-theme-option" data-value="dark">Dark</button>
            <button class="kv-theme-option" data-value="auto">Auto</button>
        </div>
    </div>

    <div class="auth-box">
        <div class="auth-logo">K</div>
        <h1 id="role-title">Manager Login</h1>
        <p class="subtitle">Restricted portal. Authorized personnel only.</p>

        <div class="alert" id="alert-box"></div>

        <form id="admin-auth-form" onsubmit="event.preventDefault(); handleLogin();">
            <div class="form-group">
                <label class="kv-label">Username</label>
                <input type="text" class="kv-input" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="kv-label">Password</label>
                <input type="password" class="kv-input" id="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="kv-button kv-button-accent auth-btn" id="login-btn">Log in</button>
        </form>

        <div class="demo-creds">
            <strong>Demo credentials</strong>
            <p style="margin:6px 0 0;">Manager: <code>manager</code> / <code>manager123</code></p>
            <p style="margin:4px 0 0;">Owner: <code>owner</code> / <code>owner123</code></p>
        </div>
    </div>

    <a href="role-select.html" class="back-link">← Back to portal selection</a>

    <script src="../korvia-ui.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const requestedRole = params.get('role') || 'manager';
        const validRoles = ['manager', 'owner'];
        const role = validRoles.includes(requestedRole) ? requestedRole : 'manager';

        const credentials = {
            manager: { username: 'manager', password: 'manager123', role: 'manager' },
            owner: { username: 'owner', password: 'owner123', role: 'owner' }
        };

        const destinations = {
            manager: 'manager-dashboard.html',
            owner: 'owner-dashboard.html'
        };

        document.getElementById('role-title').textContent = role.charAt(0).toUpperCase() + role.slice(1) + ' Login';

        function showAlert(msg) {
            const box = document.getElementById('alert-box');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function recordAttempt(username, status) {
            const log = JSON.parse(localStorage.getItem('korvia_admin_auth_attempts') || '[]');
            log.unshift({
                id: 'admin_' + Date.now(),
                username,
                role,
                status,
                device: navigator.userAgent,
                at: new Date().toISOString()
            });
            localStorage.setItem('korvia_admin_auth_attempts', JSON.stringify(log));
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const creds = credentials[role];

            if (username !== creds.username || password !== creds.password) {
                recordAttempt(username, 'denied');
                showAlert('Invalid username or password.');
                return;
            }

            recordAttempt(username, 'approved');

            const session = {
                username,
                role: creds.role,
                loggedInAt: new Date().toISOString(),
                device: navigator.userAgent
            };
            localStorage.setItem('korvia_admin_session', JSON.stringify(session));

            // Also record owner-level access if owner logs in
            if (creds.role === 'owner') {
                localStorage.setItem('korvia_owner_access', 'true');
            }

            window.location.href = destinations[creds.role];
        }
    </script>
</body>
</html>
