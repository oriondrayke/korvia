<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Dashboard | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body { background: var(--kv-paper); }
        .md-main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
        .md-grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .md-card h2 {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--kv-ink-muted);
            margin-bottom: 8px;
        }
        .md-card .number {
            font-family: var(--kv-font-serif);
            font-size: 1.8rem;
            color: var(--kv-ink);
        }
        .md-section { margin-bottom: 24px; }
        .md-section h2 {
            font-family: var(--kv-font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .order-row {
            display: grid;
            grid-template-columns: 1fr auto auto auto;
            gap: 16px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--kv-rule);
        }
        .order-row:last-child { border-bottom: none; }
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .table-card {
            background: var(--kv-paper);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 150ms ease;
        }
        .table-card.occupied { background: var(--kv-danger-soft); border-color: var(--kv-danger); }
        .table-card.free { background: var(--kv-success-soft); border-color: var(--kv-success); }
        .table-card.cleaning { background: var(--kv-warning-soft); border-color: var(--kv-warning); }
        .table-card h3 { font-size: 1rem; margin-bottom: 4px; }
        .table-card p { font-size: 0.75rem; color: var(--kv-ink-muted); margin: 0; }
        .staff-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--kv-rule);
        }
        .staff-row:last-child { border-bottom: none; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
        .quick-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    </style>

    <!-- Admin auth guard -->
    <script>
    (function() {
        const allowed = ["manager", "owner"];
        const session = JSON.parse(localStorage.getItem('korvia_admin_session') || 'null');
        const currentRole = session && session.role;
        if (!currentRole || !allowed.includes(currentRole)) {
            window.location.replace('admin-login.html?role=manager');
        }
    })();
    </script>

</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Manager Dashboard
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="kv-button kv-button-sm kv-button-secondary" onclick="adminLogout()">Log out</button>
                <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                    <div class="kv-theme-slider"></div>
                    <button class="kv-theme-option" data-value="light">Light</button>
                    <button class="kv-theme-option" data-value="dark">Dark</button>
                    <button class="kv-theme-option" data-value="auto">Auto</button>
                </div>
            </div>
        </div>
    </header>

    <main class="md-main">
        <a href="../index.html" class="back-link">← Back to Korvia</a>

        <div class="kv-card" style="margin-bottom: 24px;">
            <div class="quick-links">
                <a href="menu-editor.html" class="kv-button kv-button-secondary">Menu Studio</a>
                <a href="qr-generator.html" class="kv-button kv-button-secondary">QR Generator</a>
                <a href="feedback-dashboard.html" class="kv-button kv-button-secondary">Feedback</a>
                <a href="manager-approval.html" class="kv-button kv-button-secondary">Staff Approvals</a>
            </div>
        </div>

        <div class="md-grid-4">
            <div class="kv-card md-card">
                <h2>Active Orders</h2>
                <div class="number" id="active-orders">0</div>
            </div>
            <div class="kv-card md-card">
                <h2>Occupied Tables</h2>
                <div class="number" id="occupied-tables">0</div>
            </div>
            <div class="kv-card md-card">
                <h2>Staff on Duty</h2>
                <div class="number" id="staff-duty">4</div>
            </div>
            <div class="kv-card md-card">
                <h2>Today's Sales</h2>
                <div class="number" id="today-sales">$0</div>
            </div>
        </div>

        <div class="kv-card md-section">
            <h2>Stock Alerts</h2>
            <div id="stock-alerts"></div>
        </div>

        <div class="kv-card md-section">
            <h2>Live Orders</h2>
            <div id="live-orders-list"></div>
        </div>

        <div class="kv-card md-section">
            <h2>Table Status</h2>
            <div class="table-grid" id="table-grid"></div>
        </div>

        <div class="kv-card md-section">
            <h2>Staff on Duty</h2>
            <div id="staff-list"></div>
        </div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        const STORAGE_KEY = 'korvia_orders';
        const tables = Array.from({length: 12}, (_, i) => ({
            id: i + 1,
            status: ['free', 'occupied', 'occupied', 'free', 'cleaning'][Math.floor(Math.random() * 5)],
            guests: Math.floor(Math.random() * 4) + 1
        }));
        const staff = [
            { name: 'Asha', role: 'Waitress', tables: '1-4', orders: 12 },
            { name: 'Juma', role: 'Cook', station: 'Grill', orders: 24 },
            { name: 'Mariam', role: 'Waitress', tables: '5-8', orders: 9 },
            { name: 'Omari', role: 'Reception', station: 'Front', orders: 0 }
        ];

        function loadOrders() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function render() {
            const orders = loadOrders();
            const active = orders.filter(o => o.status !== 'done' && o.status !== 'paid');
            const total = orders.reduce((sum, o) => sum + o.total, 0);
            const occupied = tables.filter(t => t.status === 'occupied').length;
            const session = JSON.parse(localStorage.getItem('korvia_staff_session') || 'null');

            document.getElementById('active-orders').textContent = active.length;
            document.getElementById('occupied-tables').textContent = occupied;
            document.getElementById('today-sales').textContent = '$' + total.toFixed(0);
            document.getElementById('staff-duty').textContent = session ? 1 : 0;

            document.getElementById('stock-alerts').innerHTML = `
                <div class="kv-alert kv-alert-danger" style="margin-bottom:8px;">⚠️ Ribeye Steak running low — 3 portions left</div>
                <div class="kv-alert kv-alert-danger">⚠️ House Red Wine out of stock</div>
            `;

            document.getElementById('live-orders-list').innerHTML = active.length ? active.map(o => `
                <div class="order-row">
                    <div>
                        <strong>${o.spotType === 'hotel' ? 'Room' : o.spotType === 'events' ? 'Stall' : 'Table'} ${o.spot}</strong>
                        <p style="font-size:0.8rem;color:var(--kv-ink-muted);margin:0;">${o.items.map(i => i.name).join(', ')}</p>
                    </div>
                    <span>$${o.total.toFixed(2)}</span>
                    <span class="kv-badge kv-badge-accent">${o.status}</span>
                    <button class="kv-button kv-button-sm kv-button-ghost" onclick="alert('Assign staff')">Assign</button>
                </div>
            `).join('') : '<p style="color:var(--kv-ink-muted);">No active orders.</p>';

            document.getElementById('table-grid').innerHTML = tables.map(t => `
                <div class="table-card ${t.status}" onclick="toggleTable(${t.id})">
                    <h3>${t.status === 'hotel' ? 'Room' : 'Table'} ${t.id}</h3>
                    <p>${t.status}</p>
                    ${t.status === 'occupied' ? `<p>${t.guests} guests</p>` : ''}
                </div>
            `).join('');

            document.getElementById('staff-list').innerHTML = session ? `
                <div class="staff-row">
                    <span><strong>${session.name}</strong> — ${session.role} • on duty</span>
                    <span>${session.venue}</span>
                </div>
            ` : '<p style="color:var(--kv-ink-muted);">No staff currently on duty.</p>';
        }

        function toggleTable(id) {
            const t = tables.find(x => x.id === id);
            const states = ['free', 'occupied', 'cleaning'];
            t.status = states[(states.indexOf(t.status) + 1) % states.length];
            render();
        }

        function adminLogout() {
            localStorage.removeItem('korvia_admin_session');
            window.location.href = 'admin-login.html?role=manager';
        }

        render();
        setInterval(render, 3000);
    </script>
</body>
</html>
