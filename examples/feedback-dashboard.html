<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body { background: var(--kv-paper); }
        .fd-main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { text-align: center; }
        .stat-card .number {
            font-family: var(--kv-font-serif);
            font-size: 2rem;
            color: var(--kv-ink);
        }
        .stat-card .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--kv-ink-muted);
        }
        .review-card {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 20px;
            margin-bottom: 16px;
        }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .stars { color: var(--kv-warning); }
        .review-text { color: var(--kv-ink-muted); font-size: 0.95rem; }
        .review-meta { font-size: 0.8rem; color: var(--kv-ink-muted); margin-top: 10px; }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
    </style>

    <!-- Admin auth guard -->
    <script>
    (function() {
        const allowed = ["manager", "owner"];
        const session = JSON.parse(localStorage.getItem('korvia_admin_session') || 'null');
        const currentRole = session && session.role;
        if (!currentRole || !allowed.includes(currentRole)) {
            window.location.replace('admin-login.html?role=manager');
        }
    })();
    </script>

</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Customer Feedback
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <main class="fd-main">
        <a href="../index.html" class="back-link">← Back to Korvia</a>

        <div class="stats">
            <div class="kv-card stat-card">
                <div class="number" id="avg-rating">0</div>
                <div class="label">Average rating</div>
            </div>
            <div class="kv-card stat-card">
                <div class="number" id="total-reviews">0</div>
                <div class="label">Reviews</div>
            </div>
            <div class="kv-card stat-card">
                <div class="number" id="total-tips">$0</div>
                <div class="label">Tips received</div>
            </div>
        </div>

        <div id="reviews-list"></div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        const feedback = JSON.parse(localStorage.getItem('korvia_feedback') || '[]');
        const tips = JSON.parse(localStorage.getItem('korvia_tips') || '[]');

        const avg = feedback.length ? (feedback.reduce((s, r) => s + r.rating, 0) / feedback.length).toFixed(1) : '0.0';
        const totalTips = tips.reduce((s, t) => s + t.amount, 0);

        document.getElementById('avg-rating').textContent = avg;
        document.getElementById('total-reviews').textContent = feedback.length;
        document.getElementById('total-tips').textContent = '$' + totalTips.toFixed(0);

        const list = document.getElementById('reviews-list');
        if (feedback.length === 0) {
            list.innerHTML = '<p style="color:var(--kv-ink-muted);">No feedback yet. Customers can leave reviews from their receipt page.</p>';
        } else {
            list.innerHTML = feedback.slice().reverse().map(r => `
                <div class="review-card">
                    <div class="review-header">
                        <span class="stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                        <span style="font-size:0.8rem;color:var(--kv-ink-muted);">${new Date(r.time).toLocaleString()}</span>
                    </div>
                    <p class="review-text">${r.text || 'No written feedback.'}</p>
                    <p class="review-meta">Order ${r.orderId.slice(-6)} • ${r.venue}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
