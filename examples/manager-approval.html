<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login Approvals | Korvia</title>
    <link rel="stylesheet" href="../korvia.css">
    <style>
        body { background: var(--kv-paper); }
        .ma-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .ma-section { margin-bottom: 24px; }
        .ma-section h2 {
            font-family: var(--kv-font-serif);
            font-size: 1.25rem;
            font-weight: 400;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--kv-rule);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 16px;
            color: var(--kv-ink-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .back-link:hover { color: var(--kv-accent); }
        .request-card {
            background: var(--kv-card);
            border: 1px solid var(--kv-rule);
            border-radius: var(--kv-radius);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .request-info p { margin: 2px 0; font-size: 0.85rem; color: var(--kv-ink-muted); }
        .request-info strong { color: var(--kv-ink); font-size: 1rem; }
        .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .otp-display {
            font-family: var(--kv-font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.15rem;
            color: var(--kv-accent);
            margin: 6px 0;
        }
        .trusted-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--kv-ink-muted);
        }
        .empty { color: var(--kv-ink-muted); font-size: 0.9rem; }
        .alert-banner {
            background: var(--kv-success-soft);
            color: var(--kv-success);
            border: 1px solid var(--kv-success);
            padding: 12px 16px;
            border-radius: var(--kv-radius);
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body class="kv-ruled-subtle">
    <header class="kv-header">
        <div class="kv-container kv-header-inner">
            <div class="kv-logo">
                <span class="kv-logo-mark">K</span>
                Staff Login Approvals
            </div>
            <div class="kv-theme-switch" id="kv-theme-switch" aria-label="Theme">
                <div class="kv-theme-slider"></div>
                <button class="kv-theme-option" data-value="light">Light</button>
                <button class="kv-theme-option" data-value="dark">Dark</button>
                <button class="kv-theme-option" data-value="auto">Auto</button>
            </div>
        </div>
    </header>

    <main class="ma-main">
        <a href="role-select.html" class="back-link">← Back to portals</a>

        <div class="alert-banner" id="alert-banner"></div>

        <div class="kv-card ma-section">
            <h2>Pending requests</h2>
            <div id="pending-list"></div>
        </div>

        <div class="kv-card ma-section">
            <h2>Recently approved</h2>
            <div id="approved-list"></div>
        </div>
    </main>

    <script src="../korvia-ui.js"></script>
    <script>
        const ATTEMPTS_KEY = 'korvia_staff_auth_attempts';
        const OTP_KEY = 'korvia_staff_otp';

        function loadAttempts() {
            return JSON.parse(localStorage.getItem(ATTEMPTS_KEY) || '[]');
        }

        function saveAttempts(attempts) {
            localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(attempts));
        }

        function seedDemoRequest() {
            const attempts = loadAttempts();
            if (!attempts.some(a => a.status === 'pending')) {
                attempts.unshift({
                    id: 'req_' + Date.now(),
                    handle: 'grace',
                    venue: 'sunset-bistro',
                    email: 'owner@sunsetbistro.co.tz',
                    device: 'Chrome / Android',
                    status: 'pending',
                    at: new Date().toISOString()
                });
                saveAttempts(attempts);
            }
        }

        function approve(id) {
            const code = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem(OTP_KEY, code);

            const attempts = loadAttempts().map(a =>
                a.id === id ? { ...a, status: 'approved', otp: code, approvedAt: new Date().toISOString() } : a
            );
            saveAttempts(attempts);

            document.getElementById('alert-banner').style.display = 'block';
            document.getElementById('alert-banner').innerHTML = `
                Approved <strong>grace</strong>. Share this OTP: <span class="otp-display">${code}</span>
            `;
            render();
        }

        function deny(id) {
            const attempts = loadAttempts().map(a =>
                a.id === id ? { ...a, status: 'denied', deniedAt: new Date().toISOString() } : a
            );
            saveAttempts(attempts);
            render();
        }

        function renderCard(a, isPending) {
            const when = new Date(a.at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return `
                <div class="request-card">
                    <div class="request-info">
                        <strong>${a.handle}</strong>
                        <p>Venue: ${a.venue}</p>
                        <p>Device: ${a.device}</p>
                        <p>Requested at ${when}</p>
                        ${a.otp ? `<p>OTP: <span class="otp-display">${a.otp}</span></p>` : ''}
                    </div>
                    ${isPending ? `
                    <div class="actions">
                        <label class="trusted-toggle">
                            <input type="checkbox" checked> Trust device
                        </label>
                        <button class="kv-button kv-button-sm kv-button-ghost" onclick="deny('${a.id}')">Deny</button>
                        <button class="kv-button kv-button-sm kv-button-accent" onclick="approve('${a.id}')">Approve</button>
                    </div>
                    ` : `<span class="kv-badge ${a.status === 'approved' ? 'kv-badge-accent' : ''}" style="${a.status === 'approved' ? '' : 'border-color:var(--kv-danger);color:var(--kv-danger);background:var(--kv-danger-soft);'}">${a.status}</span>`}
                </div>
            `;
        }

        function render() {
            const attempts = loadAttempts();
            const pending = attempts.filter(a => a.status === 'pending');
            const approved = attempts.filter(a => a.status !== 'pending').slice(0, 5);

            document.getElementById('pending-list').innerHTML = pending.length
                ? pending.map(a => renderCard(a, true)).join('')
                : '<p class="empty">No pending login requests.</p>';

            document.getElementById('approved-list').innerHTML = approved.length
                ? approved.map(a => renderCard(a, false)).join('')
                : '<p class="empty">No recent approvals.</p>';
        }

        seedDemoRequest();
        render();
        setInterval(render, 3000);
    </script>
</body>
</html>
